<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Streak Tracker · Hawky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          coral: { DEFAULT: '#E55A3F', hover: '#D14A30', deep: '#A8351E', subtle: '#FEF1EE', soft: '#FDDDD3' },
          ink:  { 900: '#18181B', 600: '#52525B', 400: '#A1A1AA' },
          surf: { 0: '#FFFFFF', 50: '#FAFAFA', 100: '#F4F4F5', 200: '#E4E4E7' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
      } }
    }
  </script>
  <style> html, body { font-family: 'Inter', system-ui, sans-serif; } </style>
</head>
<body class="bg-surf-50 text-ink-900 antialiased min-h-screen flex items-center justify-center px-6">
  <main class="w-full max-w-sm">
    <div class="bg-white border border-surf-200 rounded-lg shadow-sm p-8 text-center">
      <div class="flex items-center justify-center gap-2 font-semibold text-lg mb-1">
        <span class="inline-block w-2.5 h-2.5 rounded-full bg-coral"></span>
        Streak Tracker
      </div>
      <p class="text-ink-400 text-sm mb-6">Hawky internal · sign in to continue</p>

      {% if error %}
      <div class="mb-5 px-4 py-3 rounded-md border border-red-300 bg-red-50 text-red-800 text-sm text-left">
        {{ error }}
      </div>
      {% endif %}

      <a href="{{ url_for('auth_google') }}"
         class="flex items-center justify-center gap-3 w-full px-4 py-2.5 rounded-md border border-surf-200 bg-white hover:bg-surf-50 text-sm font-medium transition-colors">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
        </svg>
        Sign in with Google
      </a>

      <p class="text-ink-400 text-xs mt-5">Only authorized Hawky accounts can access this dashboard.</p>
    </div>
  </main>
</body>
</html>
